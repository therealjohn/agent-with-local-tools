# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: seattle-hotel-agent
description: |
    A travel assistant agent that helps users find hotels in Seattle. Demonstrates local Python tool execution - a key advantage of code-based  hosted agents over prompt agents.
metadata:
    authors:
        - Microsoft
    tags:
        - Azure AI AgentServer
        - Microsoft Agent Framework
        - Local Tools
        - Travel Assistant
        - Hotel Search
protocols:
    - protocol: responses
      version: ""
environment_variables:
    - name: PROJECT_ENDPOINT
      value: ${AZURE_AI_PROJECT_ENDPOINT}
    - name: MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
